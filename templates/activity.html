<!DOCTYPE html>
<html lang="el"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ιστορικό ενεργειών — CONDIAN</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;} body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#eff9fb;color:#1a1a1a;}
.topbar{background:#193847;color:white;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
.topbar a{color:white;text-decoration:none;font-size:13px;padding:6px 12px;background:rgba(255,255,255,0.15);border-radius:6px;}
.container{max-width:1000px;margin:0 auto;padding:24px;}
.card{background:white;border-radius:12px;padding:20px;border:1px solid #d6eef3;}
table{width:100%;border-collapse:collapse;font-size:13px;} th{text-align:left;padding:8px;color:#888;border-bottom:1px solid #eee;} td{padding:8px;border-bottom:1px solid #f5f5f5;}
.act{font-family:monospace;font-size:12px;background:#eef2ff;color:#193847;padding:2px 6px;border-radius:4px;}
</style><style>:root{--brand:{{ theme.primary }};--accent:{{ theme.accent }};}
.app-header,.app-header.pool,.topbar{background:var(--brand)!important;}
.submit-btn,.submit-btn.pool,.btn-primary,.save-btn{background:var(--brand)!important;}
.period-btn.active,.period-btn.pool.active{border-bottom-color:var(--accent)!important;color:var(--brand)!important;}</style>
<script>try{if(new URLSearchParams(location.search).get("embed")==="1"){document.documentElement.classList.add("embed");document.addEventListener("DOMContentLoaded",function(){document.querySelectorAll("a[href^='/']").forEach(function(a){var h=a.getAttribute("href");if(h&&h.indexOf("embed=")<0&&!a.target){a.setAttribute("href",h+(h.indexOf("?")<0?"?":"&")+"embed=1");}});});}}catch(e){}</script>
<style>.embed .app-header,.embed .topbar{display:none!important;}.embed body{background:transparent!important;}</style>
</head><body>
<div class="topbar">
  <div><strong><img src="/static/img/logo-white.svg" style="height:20px;vertical-align:middle;margin-right:8px;">Ιστορικό ενεργειών</strong></div>
  <div><a href="/dashboard"><i class="ti ti-arrow-left"></i> Dashboard</a></div>
</div>
<div class="container"><div class="card">
<table><thead><tr><th>Ημ/ώρα (UTC)</th><th>Χρήστης</th><th>Ενέργεια</th><th>Λεπτομέρεια</th></tr></thead><tbody>
{% for l in logs %}
<tr><td style="white-space:nowrap;">{{ l.created_at.strftime('%d/%m/%Y %H:%M') }}</td>
<td>{{ l.user.full_name if l.user else '—' }}</td>
<td><span class="act">{{ l.action }}</span></td>
<td style="color:#666;">{{ l.detail or '' }}</td></tr>
{% else %}<tr><td colspan="4" style="text-align:center;color:#aaa;padding:20px;">Καμία ενέργεια ακόμα</td></tr>{% endfor %}
</tbody></table></div></div></body></html>
