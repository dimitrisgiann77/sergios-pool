<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sergios Hotel — Water Log</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:linear-gradient(135deg,#193847 0%,#122a36 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
.card { background:white; border-radius:20px; padding:40px 36px; width:100%; max-width:380px; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
.logo { text-align:center; margin-bottom:28px; }
.logo-icon { font-size:48px; display:block; margin-bottom:8px; }
.hotel-name { font-size:18px; font-weight:700; color:#193847; letter-spacing:0.5px; }
.subtitle { font-size:13px; color:#888; margin-top:4px; }
.form-group { margin-bottom:18px; }
label { display:block; font-size:13px; font-weight:500; color:#555; margin-bottom:6px; }
input { width:100%; padding:12px 14px; border:1.5px solid #e5e5e0; border-radius:10px; font-size:15px; color:#1a1a1a; background:#fafafa; transition:border-color 0.2s; }
input:focus { outline:none; border-color:#193847; background:white; }
button[type=submit] { width:100%; padding:14px; background:#193847; color:white; border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; margin-top:8px; }
button[type=submit]:hover { background:#122a36; }
.error { background:#FEE; color:#c0392b; border:1px solid #FCC; border-radius:8px; padding:10px 14px; font-size:13px; margin-bottom:16px; text-align:center; }
.lang-switch { text-align:center; margin-top:20px; font-size:13px; color:#aaa; }
.lang-switch a { color:#193847; text-decoration:none; font-weight:500; }
</style>
<style>:root{--brand:{{ theme.primary }};--accent:{{ theme.accent }};}
.app-header,.app-header.pool,.topbar{background:var(--brand)!important;}
.submit-btn,.submit-btn.pool,.btn-primary,.save-btn{background:var(--brand)!important;}
.period-btn.active,.period-btn.pool.active{border-bottom-color:var(--accent)!important;color:var(--brand)!important;}</style>
<style>body{background:linear-gradient(135deg,var(--brand) 0%,var(--brand) 100%)!important;} button[type=submit]{background:var(--brand)!important;}</style>
<script>try{if(new URLSearchParams(location.search).get("embed")==="1"){document.documentElement.classList.add("embed");document.addEventListener("DOMContentLoaded",function(){document.querySelectorAll("a[href^='/']").forEach(function(a){var h=a.getAttribute("href");if(h&&h.indexOf("embed=")<0&&!a.target){a.setAttribute("href",h+(h.indexOf("?")<0?"?":"&")+"embed=1");}});});}}catch(e){}</script>
<style>.embed .app-header,.embed .topbar{display:none!important;}.embed body{background:transparent!important;}</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="{{ theme.logo or '/static/img/logo-mark.png' }}" alt="logo" style="height:60px;margin-bottom:4px;">
    <div class="hotel-name">{{ theme.app_title }}</div>
    <div class="subtitle">Water Log — Νερά Χρήσης</div>
  </div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" autocomplete="username" required autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit">Εισοδος →</button>
  </form>
  <div class="link" style="text-align:center;margin-top:16px;font-size:13px;"><a href="/register" style="color:#193847;font-weight:600;text-decoration:none;">Εγγραφή νέου χρήστη →</a></div>
  <div class="lang-switch">
    <a href="/set-language/el">ΕΛ</a> &nbsp;|&nbsp; <a href="/set-language/en">EN</a>
  </div>
</div>
</body>
</html>
