<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Εστία — CONDIAN HOTELS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/auth.css">
</head>
<body>
<canvas id="bg"></canvas>
<div class="orb a"></div>
<div class="orb b"></div>

<div class="langbar" id="langbar">
  <div class="lang-btn" onclick="authToggleLang(event)">
    <i class="ti ti-world"></i>
    <span>{{ {'el':'ΕΛ','en':'EN','uk':'UK'}.get(session.get('language','el'),'ΕΛ') }}</span>
    <i class="ti ti-chevron-down chev"></i>
  </div>
  <div class="lang-pop">
    <a class="lang-opt {{ 'on' if session.get('language','el')=='el' }}" href="/set-language/el"><span class="fl">🇬🇷</span> Ελληνικά</a>
    <a class="lang-opt {{ 'on' if session.get('language')=='en' }}" href="/set-language/en"><span class="fl">🇬🇧</span> English</a>
    <a class="lang-opt {{ 'on' if session.get('language')=='uk' }}" href="/set-language/uk"><span class="fl">🇺🇦</span> Українська</a>
  </div>
</div>

<div class="card">
  <div class="logo-block">
    <div class="logo-wrap"><img src="/static/img/logo-white.svg" alt="logo"></div>
    <div class="brandname">{{ theme.app_title }}</div>
    <div class="tagline">we reinvent the way we work</div>
    <div class="badge-ai"><span class="dot"></span> AI-Powered · SpithaAI</div>
  </div>
  {% if error %}<div class="msg error">{{ error }}</div>{% endif %}
  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" autocomplete="username" placeholder="το όνομα χρήστη σου" required autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
    </div>
    <button type="submit">Είσοδος →</button>
  </form>
  <div class="link"><a href="/register">Εγγραφή νέου χρήστη →</a></div>
</div>

<footer class="auth-foot">
  <div class="cright">© 2026 CONDIAN Hotels — All rights reserved.</div>
  <div class="auth-social">
    <a href="#" title="Facebook" target="_blank" rel="noopener"><i class="ti ti-brand-facebook"></i></a>
    <a href="#" title="LinkedIn" target="_blank" rel="noopener"><i class="ti ti-brand-linkedin"></i></a>
  </div>
</footer>

<div class="toast" id="toast"></div>
<script src="/static/auth.js"></script>
</body>
</html>
