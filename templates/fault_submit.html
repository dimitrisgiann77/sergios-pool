<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Εστία — Δήλωση Βλάβης</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#f0f7ff; color:#1a1a1a; }
.topbar { background:#193847; color:white; padding:14px 24px; }
.topbar-title { font-size:16px; font-weight:600; }
.topbar-sub { font-size:12px; opacity:.75; margin-top:2px; }
.container { max-width:680px; margin:0 auto; padding:24px; }
.card { background:white; border-radius:12px; padding:22px; border:1px solid #e0f0ff; margin-bottom:18px; }
label { display:block; font-size:13px; color:#555; margin:12px 0 6px; font-weight:500; }
input, select, textarea { width:100%; padding:11px 13px; border:1px solid #d6eef3; border-radius:9px; font-size:15px; font-family:inherit; }
textarea { min-height:110px; resize:vertical; }
.btn { width:100%; margin-top:16px; padding:13px; border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; background:#193847; color:#fff; }
.error { background:#fee2e2; color:#dc2626; border:1px solid #fecaca; border-radius:9px; padding:10px 14px; font-size:13px; margin-bottom:12px; }
.done { text-align:center; padding:30px 10px; }
.done .ico { font-size:48px; color:#16a34a; }
.done .code { font-size:22px; font-weight:700; color:#193847; margin:10px 0; letter-spacing:.5px; }
.muted { color:#888; font-size:13px; }
.row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media(max-width:520px){ .row2 { grid-template-columns:1fr; } }
</style>
<style>:root{--brand:{{ theme.primary }};}.topbar{background:var(--brand)!important;}.btn{background:var(--brand)!important;}.done .code{color:var(--brand)!important;}</style>
<script>try{if(new URLSearchParams(location.search).get("embed")==="1"){document.documentElement.classList.add("embed");document.addEventListener("DOMContentLoaded",function(){document.querySelectorAll("a[href^='/']").forEach(function(a){var h=a.getAttribute("href");if(h&&h.indexOf("embed=")<0&&!a.target){a.setAttribute("href",h+(h.indexOf("?")<0?"?":"&")+"embed=1");}});});}}catch(e){}</script>
<style>.embed .topbar{display:none!important;}.embed body{background:transparent!important;}</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-title"><i class="ti ti-tool"></i> ΕΣΤΙΑ — Δήλωση Βλάβης</div>
  <div class="topbar-sub">Καταχώρηση νέας βλάβης / αιτήματος</div>
</div>
<div class="container">
  {% if done %}
  <div class="card done">
    <div class="ico"><i class="ti ti-circle-check"></i></div>
    <div class="code">{{ code }}</div>
    <p class="muted">Η βλάβη καταχωρήθηκε και θα δρομολογηθεί. Θα ενημερωθείς για την εξέλιξη.</p>
    <a href="/fault?embed=1" class="btn" style="display:inline-block;width:auto;text-decoration:none;margin-top:18px;padding:11px 22px;">Νέα δήλωση</a>
  </div>
  {% else %}
  <div class="card">
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST" action="/fault?embed=1" enctype="multipart/form-data">
      <label>Ξενοδοχείο</label>
      <select name="hotel_id" required>
        {% for h in hotels %}<option value="{{ h.id }}">{{ h.name }}</option>{% endfor %}
      </select>
      <div class="row2">
        <div>
          <label>Κατηγορία</label>
          <select name="category_id">
            <option value="">— Επιλογή —</option>
            {% for c in cats %}<option value="{{ c.id }}">{{ '· ' * (c.level-1) }}{{ c.name }}</option>{% endfor %}
          </select>
        </div>
        <div>
          <label>Προτεραιότητα</label>
          <select name="priority">
            {% for p in priorities %}<option value="{{ p }}" {{ 'selected' if p=='Κανονική' }}>{{ p }}</option>{% endfor %}
          </select>
        </div>
      </div>
      <label>Περιγραφή</label>
      <textarea name="message" placeholder="Περίγραψε τη βλάβη (τι, πού, πόσο επείγον)…" required></textarea>
      <label>Φωτογραφία (προαιρετικά)</label>
      <input type="file" name="cover" accept="image/*">
      <button class="btn" type="submit"><i class="ti ti-send"></i> Υποβολή βλάβης</button>
    </form>
  </div>
  {% endif %}
</div>
</body>
</html>
